<!doctype html>
<html>
  <head>
    <title>React Basics</title>
  </head>
  <body>
    <div class="js-container"></div>

    <script>
      // const productCost =10+2*8
      //     console.log(productCost);
      // console.log(dayjs().format('MMM D'));
    </script>
    <script src="https://unpkg.com/supersimpledev@8.6.4/dayjs.js"></script>
    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>

    <script type="text/babel">
      function ChatInput() {
        return (
          <div>
            <input placeholder="write say hello" type="text"  size='30px'/>
            <button>submit</button>
          </div>
        );
      }

      function ChatMessage(props) {
        console.log(props.message);
        
        return (
          <div >
            <p>{props.message}</p>
            <img src="../images/user.png" alt="" height="50px" />
             <p>hello user !</p>
            <img src="../images/robot.png" alt=""  height="50px"/>
          </div>
        );
      }

      function App() {
        return (
          <div>
            <ChatInput   />
            <ChatMessage message="Hello Robot" />
          </div>
        );
      }

      const container = document.querySelector(".js-container");
      const root = ReactDOM.createRoot(container);
      root.render(<App />);
    </script>
  </body>
</html>
