<!doctype html>
<html>
  <head>
    <title>React Basics</title>
  </head>
  <body>
    <div class="js-container"></div>

    <script>
      // const productCost =10+2*8
      //     console.log(productCost);
      // console.log(dayjs().format('MMM D'));
    </script>
    <script src="https://unpkg.com/supersimpledev@8.6.4/dayjs.js"></script>
    <script src="https://unpkg.com/supersimpledev/react.js"></script>
<script src="https://unpkg.com/supersimpledev/chatbot.js"></script>

    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>

    <script type="text/babel">
      function ChatInput({chatMessages,setChatMessages}) {
        const [inputText,setInputText]=React.useState("")

 function saveInputText(event){
          setInputText(event.target.value)
          // console.log(event.target.value);

          
        }

        function SendMessage(){

         setChatMessages([
          ...chatMessages,
          {
            message:inputText,
          sender:'user',
          id:crypto.randomUUID() 
          }
        ])

         const response =Chatbot.getResponse(inputText)

 setChatMessages([
          ...chatMessages,
          {
            message:response,
          sender:'robot',
          id:crypto.randomUUID() 
          }
        ])


         console.log(response);
         
          console.log(chatMessages);
         
           setInputText('')
        }

      
       
         
        return (
          <div>
            <input placeholder="write say hello" type="text" size="30px" onChange={saveInputText} value={inputText}/>
            <button onClick={SendMessage}>submit</button>
          </div>
        );
      }

      function ChatMessage({ message, sender }) {

          
        return (
          <>
            {sender === "user" ? (
              <img src="../images/user.png" alt="" height="50px" />
            ) : (
              <img src="../images/robot.png" alt="" height="50px" />
            )}
            <p>{message}</p>
          </>
        );
      }

function ChatMessages({chatMessages}){
return(
  <>{
      chatMessages.map((chat, index) => {
              return (
                <div key={index}>
                  <ChatMessage
                    message={chat.message}
                    sender={chat.sender}
                    key={chat.id}
                  />
                </div>
              );
            })
  }
  </>
)
}



      function App() {
        const [chatMessages,setChatMessages]=React.useState([
          {
            id: 1,
            message: "Hello Robot",
            sender: "user",
          },
          {
            id: 2,
            message: "How can i help you",
            sender: "robot",
          },
          {
            id: 3,
            message: "roll dice",
            sender: "user",
          },
          {
            id: 4,
            message: "date",
            sender: "user",
          },
          {
            id: 5,
            message:
              "Sorry, I didn't quite understand that. Currently, I only know how to flip a coin, roll a dice, or get today's date. Let me know how I can help!",
            sender: "robot",
          },
        ]
)
    

        return (
          <div>
            <ChatInput chatMessages={chatMessages} setChatMessages={setChatMessages} />
        <ChatMessages chatMessages={chatMessages}/>
          </div>
        );
      }

      const container = document.querySelector(".js-container");
      const root = ReactDOM.createRoot(container);
      root.render(<App />);
    </script>
  </body>
</html>
