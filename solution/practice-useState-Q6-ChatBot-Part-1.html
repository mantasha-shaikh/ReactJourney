<!doctype html>
<html>
  <head>
    <title>React Chatbot</title>

    <style>
      body {
        margin: 0;
        font-family: Arial;
        background: #f5f5f5;
        padding: 0;
      }

      .chat-app {

        max-width: 800px;
        margin: auto;
        padding: 20px;

        height: 100vh;
          display: flex;
  flex-direction: column;
      }

      .chat-input-container {
        display: flex;
        gap: 10px;
        position: sticky;
        top: 0;
        background: #f5f5f5;
        padding-bottom: 60px;
      }

      .chat-input {
        flex-grow: 1;
        padding: 14px;
        border-radius: 12px;
        border: 1px solid gray;
        font-size: 16px;
      }

      .send-button {
        background: green;
        color: white;
        border: none;
        padding: 14px 22px;
        border-radius: 12px;
        cursor: pointer;
        font-size: 16px;
      }

      .message-row {
        display: flex;
        margin: 20px 0;
        
      }

      .user-message-row {
        justify-content: flex-end;
      }

      .robot-message-row {
        justify-content: flex-start;
      }

      .message-content {
        display: flex;
        align-items: flex-end;
        gap: 10px;
        max-width: 75%;
       
      }

      .message-bubble {
        background: #e9e9e9;
        padding: 12px 16px;
        border-radius: 14px;
        font-size: 18px;
        word-break: break-word;
      }

      .message-container{
        flex-grow: 1;
        margin-top: 20px;
        overflow: scroll;
        scrollbar-width: none;
      }

      .profile-pic {
        width: 48px;
      }

      @media (max-width: 600px) {
        .chat-app {
          padding: 10px;
        }

        .message-content {
          max-width: 90%;
        }

        .message-bubble {
          font-size: 16px;
        }

        .chat-input-container {
          flex-direction: column;
        }

        .send-button {
          width: 100%;
        }
      }
    </style>
  </head>

  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>
    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script src="https://unpkg.com/supersimpledev/chatbot.js"></script>

    <script type="text/babel">
      function ChatInput({ chatMessages, setChatMessages }) {
        const [inputText, setInputText] = React.useState("");

        function saveInputText(event) {
          setInputText(event.target.value);
        }

        function SendMessage() {
          if (!inputText.trim()) {
            return;
          }

          const newChatMessages = [
            ...chatMessages,
            {
              message: inputText,
              sender: "user",
              id: crypto.randomUUID(),
            },
          ];

          setChatMessages(newChatMessages);

          const response = Chatbot.getResponse(inputText);

          setChatMessages([
            ...newChatMessages,
            {
              message: response,
              sender: "robot",
              id: crypto.randomUUID(),
            },
          ]);

          setInputText("");
        }

        return (
          <div className="chat-input-container">
            <input
              className="chat-input"
              placeholder="Send a message to Chatbot"
              type="text"
              onChange={saveInputText}
              value={inputText}
            />

            <button
              className="send-button"
              onClick={SendMessage}
            >
              Send
            </button>
          </div>
        );
      }

      function ChatMessage({ message, sender }) {
        return (
          <div
            className={`message-row ${
              sender === "user"
                ? "user-message-row"
                : "robot-message-row"
            }`}
          >
            <div className="message-content">
              {sender === "robot" && (
                <img
                  className="profile-pic"
                  src="../images/robot.png"
                />
              )}

              <div className="message-bubble">
                {message}
              </div>

              {sender === "user" && (
                <img
                  className="profile-pic"
                  src="../images/user.png"
                />
              )}
            </div>
          </div>
        );
      }

      function ChatMessages({ chatMessages }) {
        React.useEffect(()=>{
          console.log("useeffect mean  run after  some code created or updated  ");
               console.log("useeffect  have params array[ ] controls when useeffct run sand only once run, after compnent created   ");
        })
        return (
          <div className="message-container">
            {chatMessages.map((chat) => {
              return (
                <ChatMessage
                  key={chat.id}
                  message={chat.message}
                  sender={chat.sender}
                />
              );
            })}
          </div>
        );
      }

      function App() {
        const [chatMessages, setChatMessages] =
          React.useState([
            {
              id: 1,
              message: "Hello Robot",
              sender: "user",
            },
            {
              id: 2,
              message: "Hello! How can I help you?",
              sender: "robot",
            },
          ]);

        return (
          <div className="chat-app">
            

            <ChatMessages
              chatMessages={chatMessages}
            />

            <ChatInput
              chatMessages={chatMessages}
              setChatMessages={setChatMessages}
            />
          </div>
        );
      }

      const container =
        document.querySelector(".js-container");

      const root =
        ReactDOM.createRoot(container);

      root.render(<App />);
    </script>
  </body>
</html>
