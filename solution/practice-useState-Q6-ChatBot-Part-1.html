<!doctype html>
<html>
  <head>
    <title>React Basics</title>
  </head>
  <body>
    <div class="js-container"></div>

    <script>
      // const productCost =10+2*8
      //     console.log(productCost);
      // console.log(dayjs().format('MMM D'));
    </script>
    <script src="https://unpkg.com/supersimpledev@8.6.4/dayjs.js"></script>
    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>

    <script type="text/babel">
      function ChatInput({chatMessages,setChatMessages}) {
        const [inputText,setInputText]=React.useState("")
        function SendMessage(){
        //  chatMessages.push({
        //   message:'test',
        //   sender:'user',
        //   id:crypto.randomUUID()

        //  })
        // setChatMessages([
        //   ...chatMessages,
        //   {
        //     message:'test',
        //   sender:'user',
        //   id:crypto.randomUUID() 
        //   }
        // ])
         setChatMessages([
          ...chatMessages,
          {
            message:inputText,
          sender:'user',
          id:crypto.randomUUID() 
          }
        ])
         console.log(chatMessages);
         
          
        }
 setInputText('')
      
        function saveInputText(event){
          setInputText(event.target.value)
          // console.log(event.target.value);

          
        }
         
        return (
          <div>
            <input placeholder="write say hello" type="text" size="30px" onChange={saveInputText}/>
            <button onClick={SendMessage}>submit</button>
          </div>
        );
      }

      function ChatMessage({ message, sender }) {

        return (
          <>
            {sender === "user" ? (
              <img src="../images/user.png" alt="" height="50px" />
            ) : (
              <img src="../images/robot.png" alt="" height="50px" />
            )}
            <p>{message}</p>
          </>
        );
      }

      function App() {
        const [chatMessages,setChatMessages]=React.useState([
          {
            id: 1,
            message: "Hello Robot",
            sender: "user",
          },
          {
            id: 2,
            message: "How can i help you",
            sender: "robot",
          },
          {
            id: 3,
            message: "roll dice",
            sender: "user",
          },
          {
            id: 4,
            message: "date",
            sender: "user",
          },
          {
            id: 5,
            message:
              "Sorry, I didn't quite understand that. Currently, I only know how to flip a coin, roll a dice, or get today's date. Let me know how I can help!",
            sender: "robot",
          },
        ]
)
    

        return (
          <div>
            <ChatInput chatMessages={chatMessages} setChatMessages={setChatMessages} />
            {chatMessages.map((chat, index) => {
              return (
                <div key={index}>
                  <ChatMessage
                    message={chat.message}
                    sender={chat.sender}
                    key={chat.id}
                  />
                </div>
              );
            })}
          </div>
        );
      }

      const container = document.querySelector(".js-container");
      const root = ReactDOM.createRoot(container);
      root.render(<App />);
    </script>
  </body>
</html>
